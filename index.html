<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北海道HACCP評価調書　自己採点</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic Pro','Meiryo','Yu Gothic',sans-serif;background:#f4f6f4;color:#222;font-size:14px;line-height:1.6}
.app{max-width:900px;margin:0 auto;padding:20px 16px 60px}
.header{background:#fff;border-radius:8px;padding:20px 24px;margin-bottom:16px;border:1px solid #d0ddd0}
.header h1{font-size:20px;font-weight:600;color:#1a4a2a;margin-bottom:4px}
.header p{font-size:12px;color:#666}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;background:#fff;border-radius:8px;padding:16px 20px;margin-bottom:16px;border:1px solid #d0ddd0}
.meta-item label{display:block;font-size:11px;color:#555;margin-bottom:4px;font-weight:500}
.meta-item input{width:100%;padding:7px 10px;border:1px solid #c8d8c8;border-radius:6px;font-size:13px;color:#222;background:#fafffe;transition:border-color .2s}
.meta-item input:focus{outline:none;border-color:#1D9E75;box-shadow:0 0 0 2px rgba(29,158,117,.15)}

/* サマリー */
.summary-box{background:#fff;border-radius:8px;padding:16px 20px;margin-bottom:16px;border:1px solid #d0ddd0}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.metric{background:#f0f9f5;border-radius:6px;padding:10px 14px;border:1px solid #b8ddc8}
.metric-label{font-size:11px;color:#3a7a5a;font-weight:500;margin-bottom:4px}
.metric-value{font-size:24px;font-weight:700;color:#1a4a2a}
.progress-bar{height:6px;border-radius:3px;background:#d0e8d8;margin-top:5px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:#1D9E75;transition:width .4s ease}
.stage-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.stage-badge{display:inline-block;padding:5px 20px;border-radius:6px;font-size:15px;font-weight:700}
.stage-1{background:#FCEBEB;color:#A32D2D;border:1px solid #f5b8b8}
.stage-2{background:#FAEEDA;color:#7a4800;border:1px solid #f5cf88}
.stage-3{background:#FFF3CD;color:#6a4800;border:1px solid #f0d878}
.stage-4{background:#e8f5d0;color:#2e6010;border:1px solid #a8d870}
.stage-5{background:#d0f0e0;color:#0a5a3a;border:1px solid #70c8a0}
.stage-6{background:#a8e8cc;color:#064830;border:1px solid #48b888}
.stage-7{background:#1D9E75;color:#fff;border:1px solid #0a7050}
.stage-8{background:#0a6040;color:#fff;border:1px solid #054030}
.total-block{flex:1;min-width:180px}
.total-label{font-size:11px;color:#555;margin-bottom:4px}
.total-pct{font-size:12px;color:#444;margin-top:3px}

/* 総合コメント */
.overall-comment{background:#fff;border-radius:8px;padding:16px 20px;margin-bottom:16px;border:1px solid #d0ddd0}
.overall-comment label{display:block;font-size:12px;color:#555;font-weight:500;margin-bottom:6px}
.overall-comment textarea{width:100%;padding:8px 10px;border:1px solid #c8d8c8;border-radius:6px;font-size:13px;color:#222;background:#fafffe;resize:vertical;min-height:72px;line-height:1.6;transition:border-color .2s}
.overall-comment textarea:focus{outline:none;border-color:#1D9E75;box-shadow:0 0 0 2px rgba(29,158,117,.15)}

/* セクション */
.section-card{background:#fff;border-radius:8px;margin-bottom:12px;border:1px solid #d0ddd0;overflow:hidden}
.section-header{padding:13px 18px;background:#eaf5ee;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;border-bottom:1px solid #d0ddd0}
.section-header:hover{background:#ddf0e5}
.section-title{font-size:14px;font-weight:600;color:#1a4a2a}
.section-toggle{font-size:18px;color:#3a7a5a;transition:transform .2s;line-height:1}
.section-toggle.open{transform:rotate(180deg)}
.section-body{padding:0 18px}

/* 項目行 */
.item-row{border-top:1px solid #ece8e0;padding:10px 0 6px}
.item-row:first-child{border-top:none}
.item-top{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
.item-label{flex:1;min-width:200px;font-size:13px;color:#222;line-height:1.55;padding-top:2px}
.req-badge{display:inline-block;font-size:9px;color:#fff;background:#c0392b;border-radius:3px;padding:1px 5px;margin-left:5px;vertical-align:middle;white-space:nowrap;font-weight:600}

/* スコアボタン */
.score-select{display:flex;gap:5px;align-items:center;flex-shrink:0;padding-top:1px}
.score-btn{
  min-width:40px;height:34px;padding:0 8px;
  border:2px solid #b8c8b8;
  border-radius:6px;
  background:#f8faf8;
  color:#555;
  font-size:13px;font-weight:600;
  cursor:pointer;
  transition:all .18s;
  line-height:1;
  white-space:nowrap;
}
.score-btn:hover{background:#e0f0e8;border-color:#1D9E75;color:#1a4a2a}

/* 選択済みボタンの色 ---- 明確に色を変える */
.score-btn.sel-2{background:#1D9E75 !important;border-color:#0a7050 !important;color:#fff !important;box-shadow:0 2px 6px rgba(29,158,117,.4)}
.score-btn.sel-1{background:#E89A00 !important;border-color:#a06800 !important;color:#fff !important;box-shadow:0 2px 6px rgba(200,140,0,.4)}
.score-btn.sel-0{background:#E24B4A !important;border-color:#9a1a1a !important;color:#fff !important;box-shadow:0 2px 6px rgba(200,60,60,.35)}
.score-btn.sel-m1{background:#8B0000 !important;border-color:#5a0000 !important;color:#fff !important;box-shadow:0 2px 6px rgba(139,0,0,.5)}
.score-btn.sel-na{background:#888 !important;border-color:#555 !important;color:#fff !important}
.score-btn.two-yes.sel-2{background:#1D9E75 !important;border-color:#0a7050 !important;color:#fff !important}
.score-btn.two-no.sel-0{background:#E24B4A !important;border-color:#9a1a1a !important;color:#fff !important}

.na-btn{
  min-width:44px;height:34px;padding:0 8px;
  border:2px solid #b8b8b8;
  border-radius:6px;
  background:#f5f5f5;
  color:#888;
  font-size:11px;font-weight:600;
  cursor:pointer;
  transition:all .18s;
}
.na-btn:hover{background:#e8e8e8;border-color:#666;color:#444}
.na-btn.sel-na{background:#888 !important;border-color:#555 !important;color:#fff !important}

/* 必須マイナス警告 */
.req-warning{
  font-size:11px;color:#8B0000;
  background:#fff0f0;border:1px solid #f5b8b8;
  border-radius:4px;padding:3px 8px;
  margin-top:4px;display:none;
  width:fit-content;
}

/* グループラベル */
.group-label{font-size:12px;font-weight:600;color:#1a5a3a;background:#f0f9f3;padding:6px 8px;border-radius:4px;margin-top:10px;margin-bottom:2px;border-left:3px solid #1D9E75}

/* コメントエリア */
.comment-area{margin-top:5px}
.comment-toggle{
  font-size:11px;color:#888;background:none;border:none;cursor:pointer;
  padding:2px 0;display:inline-flex;align-items:center;gap:4px;
  transition:color .15s;
}
.comment-toggle:hover{color:#1D9E75}
.comment-toggle svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2}
.comment-input{
  width:100%;margin-top:5px;padding:6px 9px;
  border:1px solid #c8d8c8;border-radius:6px;
  font-size:12px;color:#222;background:#fafffe;
  resize:vertical;min-height:50px;line-height:1.5;
  display:none;
  transition:border-color .2s;
  font-family:inherit;
}
.comment-input:focus{outline:none;border-color:#1D9E75;box-shadow:0 0 0 2px rgba(29,158,117,.12)}

/* 注釈 */
.note-text{font-size:11px;color:#888;padding:8px 0;border-top:1px solid #ece8e0;margin-top:6px}

/* 印刷ボタン */
.print-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:13px;
  border:2px solid #1D9E75;border-radius:8px;
  background:#1D9E75;color:#fff;
  font-size:15px;font-weight:600;cursor:pointer;
  transition:all .2s;
  margin-top:8px;
}
.print-btn:hover{background:#0a7050;border-color:#0a7050}
.print-btn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>北海道HACCP評価調書　自己採点</h1>
    <p>製造・加工編　令和3年（2021年）5月改正版</p>
  </div>

  <div class="meta-grid">
    <div class="meta-item"><label>評価施設名</label><input type="text" id="facilityName" placeholder="施設名を入力"></div>
    <div class="meta-item"><label>評価の対象となった食品群</label><input type="text" id="foodGroup" placeholder="食品群を入力"></div>
    <div class="meta-item"><label>実施年月日</label><input type="date" id="evalDate"></div>
    <div class="meta-item"><label>評価実施者</label><input type="text" id="evalPerson" placeholder="氏名を入力"></div>
  </div>

  <div class="summary-box">
    <div class="summary-grid">
      <div class="metric"><div class="metric-label">Ⅰ 基本的自主管理</div><div class="metric-value" id="s1pct">－</div><div class="progress-bar"><div class="progress-fill" id="s1bar" style="width:0%"></div></div></div>
      <div class="metric"><div class="metric-label">ⅡA 施設面</div><div class="metric-value" id="s2apct">－</div><div class="progress-bar"><div class="progress-fill" id="s2abar" style="width:0%"></div></div></div>
      <div class="metric"><div class="metric-label">ⅡA 管理運営面</div><div class="metric-value" id="s2bpct">－</div><div class="progress-bar"><div class="progress-fill" id="s2bbar" style="width:0%"></div></div></div>
      <div class="metric"><div class="metric-label">ⅡA 作業手順書</div><div class="metric-value" id="smpct">－</div><div class="progress-bar"><div class="progress-fill" id="smbar" style="width:0%"></div></div></div>
      <div class="metric"><div class="metric-label">ⅡB HACCPの取組</div><div class="metric-value" id="s3pct">－</div><div class="progress-bar"><div class="progress-fill" id="s3bar" style="width:0%"></div></div></div>
    </div>
    <div class="stage-row">
      <div>
        <div style="font-size:11px;color:#555;margin-bottom:4px;font-weight:500">総合評価段階</div>
        <div id="stageDisplay" class="stage-badge stage-1">段階 −</div>
      </div>
      <div class="total-block">
        <div class="total-label">評価点数獲得率（Ⅱ-A合計）</div>
        <div class="progress-bar"><div class="progress-fill" id="totalBar" style="width:0%"></div></div>
        <div class="total-pct" id="totalPct">採点するとここに表示されます</div>
        <div id="stageDetail" style="font-size:11px;color:#666;margin-top:4px"></div>
      </div>
    </div>
  </div>

  <div class="overall-comment">
    <label>総合コメント・特記事項</label>
    <textarea id="overallComment" placeholder="全体的な所見・改善に向けた取り組みなどを記入してください"></textarea>
  </div>

  <div id="sections"></div>

  <button class="print-btn" onclick="doPrint()">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    PDF印刷（印刷ダイアログを開く）
  </button>
</div>

<script>
const SEC1 = { items:[
  {id:"i1", label:"①経営責任者は、自主的な衛生管理に積極的に取り組む意欲がありますか。", req:false},
  {id:"i2", label:"②従業員は、衛生管理に関する何らかの講習・研修を受けていますか。", req:true},
  {id:"i3", label:"③従業員の衛生管理について、毎日チェックを行っていますか。（服飾・健康状態・爪及び手指の傷）", req:true},
  {id:"i4", label:"④従業員に対して、手洗いや清掃方法、衛生管理について周知するような機会を設けていますか。", req:true},
  {id:"i5", label:"⑤冷蔵庫及び冷凍庫の温度について、毎日チェックを行っていますか。", req:true},
  {id:"i6", label:"⑥原材料受入時に衛生的チェックを行っていますか。", req:false},
  {id:"i7", label:"⑦製品及び半製品について、何らかの衛生的チェックを行っていますか。", req:false},
  {id:"i8", label:"⑧製造室や機械器具の清掃状態について、チェックを行っていますか。", req:false},
  {id:"i9", label:"⑨製造管理に関する記録がありますか。", req:true},
  {id:"i10",label:"⑩何らかの自主検査を実施していますか。", req:false},
  {id:"i11",label:"⑪施設の中で、衛生管理の改善及び向上について話し合っていますか。", req:false},
  {id:"i12",label:"⑫製造工程や保守点検等において、異常・事故・苦情対応時に適切に対応できるよう体制や対応方法を定めていますか。", req:false},
]};

const SEC2A_ITEMS = [
  {id:"a1",  label:"施設の周囲：出入口が舗装されていますか。", req:false},
  {id:"a2",  label:"更衣場所は従事者数に応じた十分な広さがあり、作業場への出入りが容易な位置にありますか。", req:true},
  {id:"a3",  label:"従業員の外衣と作業衣が更衣設備内で交差汚染していませんか。", req:false},
  {id:"a4",  label:"作業区分（汚染区分・非汚染区分）に応じ区画していますか。", req:true},
  {id:"a5",  label:"工程中に交差汚染が生じないように設備機器を配置していますか。", req:true},
  {id:"a6",  label:"より清潔な作業区域に入る場合の汚染持込防止設備がありますか。", req:false},
  {id:"a7",  label:"フォークリフト・台車等は屋内外で使い分けるよう配置していますか。", req:false},
  {id:"a8",  label:"床面・内壁・天井は清掃・消毒を容易にできる材料・構造ですか。", req:true},
  {id:"a9",  label:"十分な換気能力の設備がありますか。", req:true},
  {id:"a10", label:"作業場内に十分な採光または照度が得られる設備がありますか。", req:true},
  {id:"a11", label:"照明設備は食品むき出しの製造ライン上で飛散防止措置が取られていますか。", req:false},
  {id:"a12", label:"出入口及び作業場内に防虫設備を整えていますか。", req:false},
  {id:"a13", label:"排水溝・下水溝にはねずみの侵入を防ぐ設備がありますか。", req:true},
  {id:"a14", label:"食品を汚染しない場所に洗浄設備及び給湯設備がありますか。", req:true},
  {id:"a15", label:"用途（区域）別の清掃用具及び保管庫がありますか。", req:true},
  {id:"a16", label:"ホースの先端が床に接触しないようフック等の設備を設けていますか。", req:false},
  {id:"a17", label:"専用の流水受槽式手洗い設備及び洗浄剤・消毒剤を備えていますか。", req:true},
  {id:"a18", label:"手洗い設備には温湯が供給できますか。", req:false},
  {id:"a19", label:"手洗い設備は作業区分ごとに従業員数に応じた数を設置していますか。", req:true},
  {id:"a20", label:"手洗い設備は適切な大きさを有していますか。", req:false},
  {id:"a21", label:"手洗い設備は自動式・足踏み式・肘押し式など再汚染しない構造ですか。", req:true},
  {id:"a22", label:"ペンキの剥がれやサビはないですか。", req:false},
  {id:"a23", label:"食品に直接触れる設備・器具で木製部分が露出していませんか。", req:true},
  {id:"a24", label:"適切に洗浄・殺菌ができる構造ですか。", req:true},
  {id:"a25", label:"食品に直接触れる可能性のある機器を衛生的に保管する場所はありますか。", req:false},
  {id:"a26", label:"容器・器具類は用途に応じて専用に用意されていますか。", req:false},
  {id:"a27", label:"加熱・冷却・貯蔵設備に温度・圧力等を調整する装置があり、見やすい場所に設置していますか。", req:true},
  {id:"a28", label:"食品や添加物を計量するための計器類を備えていますか。", req:false},
  {id:"a29", label:"水道水または飲用に適する水を十分に供給できる設備がありますか。", req:true},
  {id:"a30", label:"水道水以外の水を使用する場合、消毒・浄水装置を備えていますか。", req:true},
  {id:"a31", label:"貯水槽を使用する場合は清掃しやすく汚染されない構造ですか。", req:true},
  {id:"a32", label:"排水は適切に排出・処理していますか。", req:true},
  {id:"a33", label:"作業台や機械からの水は排水溝に導かれる構造ですか。", req:false},
  {id:"a34", label:"廃棄物保管設備は十分な容量があり蓋付きの構造ですか。", req:true},
  {id:"a35", label:"作業場内の廃棄物容器は蓋のないものまたは足踏み式ですか。", req:false},
  {id:"a36", label:"トイレの出入口が直接作業場内に面していませんか。", req:false},
  {id:"a37", label:"トイレ内に流水受槽式手洗い設備及び洗浄剤・消毒剤を備えていますか。", req:true},
  {id:"a38", label:"トイレの出入りで手を汚染することはありませんか。", req:false},
  {id:"a39", label:"トイレ専用の履物を用意していますか。", req:false},
];

const SEC2B_GROUPS = [
  {label:"①施設設備・機械器具の衛生管理", items:[
    {id:"b1", label:"作業場及び保管設備等は整理整頓され、不要なものは置いていませんか。", req:true},
    {id:"b2", label:"床・壁・天井・窓・扉等に破損や故障はありませんか。", req:true},
    {id:"b3", label:"適切に清掃していますか。（カビ・サビ・残渣のこびりつきはありませんか。）", req:true},
    {id:"b4", label:"清掃用具は適切な場所で衛生的に保管されていますか。", req:true},
    {id:"b5", label:"ホースの先端が床に接触しないように取り扱っていますか。", req:false},
    {id:"b6", label:"食品に影響を与える臭気・有害な煙・蒸気等は適切に排気していますか。", req:false},
    {id:"b7", label:"作業場内に結露が生じていませんか。", req:false},
    {id:"b8", label:"手洗い設備及び洗浄設備は清潔で常に使用できる状態ですか。", req:true},
    {id:"b9", label:"トイレは常に清潔にし、定期的に清掃及び消毒していますか。", req:true},
  ]},
  {label:"②施設設備・機械器具の保守点検", items:[
    {id:"b10",label:"設備器具は適切に洗浄・消毒または殺菌・乾燥していますか。", req:true},
    {id:"b11",label:"機械器具及びその部品は所定の場所に衛生的に保管していますか。", req:true},
    {id:"b12",label:"温度計・圧力計・はかり・金属探知機等は保守点検及び校正を適正に行っていますか。", req:true},
    {id:"b13",label:"熱媒体（水・油等）や潤滑油等が食品に混入しないように取り扱っていますか。", req:false},
    {id:"b14",label:"容器・器具類は用途に応じて使い分けていますか。", req:false},
  ]},
  {label:"③従業員の衛生管理", items:[
    {id:"b15",label:"作業時には衛生的な専用の作業衣・靴を使用していますか。", req:true},
    {id:"b16",label:"帽子・ヘアネット・手袋・マスクを清潔で専用のものを正しく使用していますか。", req:false},
    {id:"b17",label:"貴金属、装飾品を身につけていませんか。", req:true},

// 手順書スコア：各項目に manual(手順書あり=true/false) と record(点検記録あり=true/false) を保持
const manualScores = {}; // id -> {manual: bool|null, record: bool|null}
SEC_MANUAL_ITEMS.forEach(it => { manualScores[it.id] = {manual:null, record:null}; });

function setManual(id, key, val) {
  if (manualScores[id][key] === val) {
    manualScores[id][key] = null;
  } else {
    manualScores[id][key] = val;
  }
  refreshManualBtns(id);
  recalc();
}

function refreshManualBtns(id) {
  const s = manualScores[id];
  ['manual','record'].forEach(key => {
    ['yes','no'].forEach(v => {
      const b = document.querySelector(`[data-mid="${id}"][data-key="${key}"][data-val="${v}"]`);
      if (!b) return;
      b.classList.remove('sel-2','sel-0');
      const cur = s[key];
      if (cur === true  && v === 'yes') b.classList.add('sel-2');
      if (cur === false && v === 'no')  b.classList.add('sel-0');
    });
  });
}

function calcManual() {
  let earned = 0, possible = 0;
  SEC_MANUAL_ITEMS.forEach(it => {
    const s = manualScores[it.id];
    if (s.manual !== null) { possible += 5; if (s.manual) earned += 5; }
    if (s.record !== null) { possible += 5; if (s.record) earned += 5; }
  });
  return {earned, possible};
}

// 全項目マップ
const allItemsMap = {};
[...SEC1.items, ...SEC2A_ITEMS, ...SEC2B_GROUPS.flatMap(g=>g.items), ...SEC3_ITEMS, ...SEC_MANUAL_ITEMS]
  .forEach(it => allItemsMap[it.id] = it);

const scores  = {};   // id -> 生の選択値(0/1/2)
const naSet   = new Set();
const comments= {};

function getEffectiveScore(item) {
  if (naSet.has(item.id)) return null;
  const raw = scores[item.id];
  if (raw === undefined) return null;
  // 必須項目で0点 → 実効値は -1
  if (item.req && raw === 0) return -1;
  return raw;
}

function setScore(id, raw, isNA) {
  if (isNA) {
    naSet.has(id) ? naSet.delete(id) : naSet.add(id);
    delete scores[id];
  } else {
    naSet.delete(id);
    scores[id] === raw ? delete scores[id] : (scores[id] = raw);
  }
  refreshBtns(id);
  recalc();
}

function refreshBtns(id) {
  const item = allItemsMap[id];
  const na   = naSet.has(id);
  const raw  = scores[id];
  const eff  = na ? null : (item.req && raw === 0 ? -1 : raw);

  // 2択ボタン
  const yBtn = document.querySelector(`[data-id="${id}"][data-val="2"]`);
  const nBtn = document.querySelector(`[data-id="${id}"][data-val="0"]`);
  // 3択ボタン
  [0,1,2].forEach(v => {
    const b = document.querySelector(`[data-id="${id}"][data-val="${v}"]`);
    if (!b) return;
    b.classList.remove('sel-2','sel-1','sel-0','sel-m1','sel-na');
    if (!na && raw === v) {
      if (item.req && v === 0) b.classList.add('sel-m1');
      else b.classList.add(`sel-${v}`);
    }
  });
  // NA ボタン
  const naBtn = document.querySelector(`[data-id="${id}"].na-btn`);
  if (naBtn) { naBtn.classList.remove('sel-na'); if(na) naBtn.classList.add('sel-na'); }
  // 警告表示
  const warn = document.getElementById('warn_'+id);
  if (warn) warn.style.display = (!na && item.req && raw === 0) ? 'block' : 'none';
}

function calcItems(items) {
  let earned = 0, possible = 0;
  items.forEach(item => {
    const eff = getEffectiveScore(item);
    if (eff === null) return;
    possible += 2;
    earned   += eff;
  });
  return {earned, possible};
}

function pctStr(e, p) {
  if (p === 0) return '－';
  const v = Math.round(e / p * 100);
  return v + '%';
}

function getStageB(earned, items) {
  // Excel版ロジック：合計点で段階判定
  // 0〜2=3, 3〜8=4, 9〜15=5, 16〜21=6, 22〜29=7(但し0点項目なし), 30=8
  if (earned <= 2)  return 3;
  if (earned <= 8)  return 4;
  if (earned <= 15) return 5;
  if (earned <= 21) return 6;
  if (earned <= 29) {
    // 0点項目がある場合は6に降格
    const hasZero = items.some(it => {
      const v = getEffectiveScore(it);
      return v !== null && v === 0;
    });
    return hasZero ? 6 : 7;
  }
  return 8;
}

function getStageA(pct) {
  if (pct < 40) return 3;
  if (pct < 50) return 4;
  if (pct < 65) return 5;
  if (pct < 70) return 6;
  if (pct < 80) return 7;
  return 8;
}

function recalc() {
  const r1  = calcItems(SEC1.items);
  const r2a = calcItems(SEC2A_ITEMS);
  const r2b = calcItems(SEC2B_GROUPS.flatMap(g=>g.items));
  const r3  = calcItems(SEC3_ITEMS);
  const rm  = calcManual();

  const s1p  = r1.possible  > 0 ? Math.round(r1.earned /r1.possible *100) : 0;
  const s2ap = r2a.possible > 0 ? Math.round(r2a.earned/r2a.possible*100) : 0;
  const s2bp = r2b.possible > 0 ? Math.round(r2b.earned/r2b.possible*100) : 0;
  const s3p  = r3.possible  > 0 ? Math.round(r3.earned /r3.possible *100) : 0;
  const smp  = rm.possible  > 0 ? Math.round(rm.earned /rm.possible  *100) : 0;

  const set = (id, val, bar, raw) => {
    document.getElementById(id).textContent = raw.possible > 0 ? val : '－';
    document.getElementById(bar).style.width = Math.max(0, raw.possible > 0 ? Math.round(raw.earned/raw.possible*100) : 0) + '%';
  };
  set('s1pct',  s1p+'%',  's1bar',  r1);
  set('s2apct', s2ap+'%', 's2abar', r2a);
  set('s2bpct', s2bp+'%', 's2bbar', r2b);
  set('s3pct',  s3p+'%',  's3bar',  r3);
  set('smpct',  smp+'%',  'smbar',  rm);

  // Ⅱ-A合計（施設面＋管理運営面＋手順書）
  const totalE = r2a.earned + r2b.earned + rm.earned;
  const totalP = r2a.possible + r2b.possible + rm.possible;
  const totalPct = totalP > 0 ? Math.round(totalE / totalP * 100) : 0;
  document.getElementById('totalPct').textContent =
    totalP > 0 ? `${totalE} / ${totalP} 点（${totalPct}%）` : '採点するとここに表示されます';
  document.getElementById('totalBar').style.width = Math.max(0, totalPct) + '%';

  // 段階判定
  // ⅡA段階：(1)+(2)+(3)の合計獲得率で判定
  const stageA = totalP > 0 ? getStageA(totalPct) : 3;
  // ⅡB段階：合計点で判定（0点項目チェック付き）
  const stageB = getStageB(r3.earned, SEC3_ITEMS);
  // 総合段階：ⅡAとⅡBの低い方
  const stageAB = Math.min(stageA, stageB);

  let stage = 1;
  if      (s1p >= 70) stage = Math.max(3, stageAB);
  else if (s1p >= 50) stage = 2;
  else                stage = 1;

  const sd = document.getElementById('stageDisplay');
  sd.textContent = '段階 ' + stage;
  sd.className = 'stage-badge stage-' + Math.min(stage, 8);

  // 段階内訳の表示
  const detailEl = document.getElementById('stageDetail');
  if (detailEl && totalP > 0) {
    detailEl.textContent = `ⅡA段階:${stageA}　ⅡB段階:${stageB}　→ 低い方を採用`;
  }
}

  na.dataset.id = item.id;

  const ta  = document.createElement('textarea');
  ta.className = 'comment-input';
  ta.placeholder = 'この項目に関するコメント・改善メモを入力';
  ta.oninput = () => { comments[item.id] = ta.value; };
  tog.onclick = () => {
    const open = ta.style.display === 'block';
    ta.style.display = open ? 'none' : 'block';
    tog.innerHTML = open
      ? '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>コメントを追加'
      : '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>コメントを閉じる';
    if (!open) ta.focus();
  };
  ca.appendChild(tog);
  ca.appendChild(ta);

  return row;

function scoreDisp(item) {
  const na  = naSet.has(item.id);
  if (na) return 'N/A';
  const raw = scores[item.id];
  if (raw === undefined) return '－';
  const eff = item.req && raw === 0 ? -1 : raw;
  if (item.two) return raw === 2 ? '○' : '×';
  return eff === -1 ? '-1（必須）' : String(eff);
}
